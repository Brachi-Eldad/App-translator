version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: translations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - appnet
    restart: unless-stopped

  translator:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    networks:
      - appnet
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/translations"
    ports:
      - "3001:3001"
    depends_on:
      - db
      - translator
    networks:
      - appnet
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:8080"
    networks:
      - appnet
    restart: unless-stopped

volumes:
  db_data:

networks:
  appnet:
    driver: bridge