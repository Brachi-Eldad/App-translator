version: '3.8'

services:
  db:
    image: postgres:15-alpine 
    environment:
      POSTGRES_DB: translations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - appnet  
    restart: always  

  translator:
    image: libretranslate/libretranslate
    ports:
      - "5000:5000"
    networks:
      - appnet 
    restart: always

  
  backend:
    build: ./backend 
    environment:
 
      DATABASE_URL: postgres://postgres:postgres@db:5432/translations
    ports:
      - "3001:3001"
    depends_on:
      - db
      - translator
    networks:
      - appnet 
    restart: always

  frontend:
    build: ./frontend 
    ports:
      - "8080:80" 
    depends_on:
      - backend 
    networks:
      - appnet 
    restart: always


volumes:
  postgres_data:
    driver: local

networks:
  appnet: 
    driver: bridge